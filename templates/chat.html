<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with PDF</title>

  <style>
    body {
      background: #f0f2f5;
      font-family: "Poppins", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .chat-container {
      max-width: 800px;
      margin: auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      height: 90vh;
    }
    .chat-header {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      padding: 15px;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
    .chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .message {
      margin-bottom: 15px;
      padding: 12px 18px;
      border-radius: 15px;
      max-width: 70%;
    }
    .human {
      background: #2575fc;
      color: white;
      margin-left: auto;
      text-align: right;
    }
    .ai {
      background: #e4e6eb;
      color: black;
      margin-right: auto;
    }
    .chat-input {
      display: flex;
      padding: 15px;
      border-top: 1px solid #ddd;
    }
    .chat-input input {
      flex: 1;
      border: none;
      outline: none;
      padding: 12px;
      border-radius: 10px;
      margin-right: 10px;
      background: #f1f3f6;
    }
    .chat-input button {
      background: #6a11cb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      transition: background 0.3s;
    }
    .chat-input button:hover {
      background: #4a0fa3;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">💬 Chat with your PDF</div>
    <div id="chatBox" class="chat-box"></div>
    <div class="chat-input">
      <input type="text" id="userMessage" placeholder="Type your message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let chatHistory = [];

    async function sendMessage() {
      const input = document.getElementById("userMessage");
      const message = input.value.trim();
      if (!message) return;

      // Show user message
      appendMessage("human", message);
      input.value = "";

      // Call backend
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message, history: chatHistory })
      });

      const data = await response.json();
      if (data.response) {
        appendMessage("ai", data.response);
        chatHistory.push({ type: "human", content: message });
        chatHistory.push({ type: "ai", content: data.response });
      } else {
        appendMessage("ai", "⚠ Error: " + (data.error || "Something went wrong."));
      }
    }

    function appendMessage(type, content) {
      const chatBox = document.getElementById("chatBox");
      const msg = document.createElement("div");
      msg.classList.add("message", type);
      msg.innerText = content;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
